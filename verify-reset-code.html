<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>JobFits - Verify Reset Code</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="auth-page">
      <div class="auth-box">
        <div class="auth-kicker">Password reset</div>
        <h1>Verify reset code</h1>
        <p class="sub">
          Enter the 6-digit code we sent to john@example.com. The code expires
          in 10 minutes.
        </p>

        <div class="info-msg">
          If an account exists for this email, we sent a reset code. Enter it
          below to continue to the password reset page.
        </div>

        <form action="reset-password.html" method="get">
          <label for="otp-reset-1">Reset code</label>
          <div class="otp-grid" aria-label="6 digit reset code">
            <input
              id="otp-reset-1"
              type="text"
              maxlength="1"
              inputmode="numeric"
              autocomplete="one-time-code"
              required
            />
            <input type="text" maxlength="1" inputmode="numeric" required />
            <input type="text" maxlength="1" inputmode="numeric" required />
            <input type="text" maxlength="1" inputmode="numeric" required />
            <input type="text" maxlength="1" inputmode="numeric" required />
            <input type="text" maxlength="1" inputmode="numeric" required />
          </div>

          <div class="timer-row">
            <span>Code expires in</span>
            <span class="timer">09:59</span>
          </div>

          <button type="submit" class="btn btn-primary btn-full">
            Verify Code
          </button>
        </form>

        <div class="auth-actions">
          <button class="btn btn-secondary btn-full" type="button">
            Resend Code
          </button>
        </div>

        <!-- Example states -->
        <!-- <div class="error-msg">The verification code is incorrect.</div> -->
        <!-- <div class="warning-msg">The verification code has expired.</div> -->

        <div class="link-row">
          <a href="forgot-password.html">Use a different email</a>
        </div>
        <div class="link-row">
          <a href="login.html">Back to login</a>
        </div>
      </div>
    </div>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JobFits - Reset Password</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-page">
  <div class="auth-box">
    <h1>Create New Password</h1>
    <p class="sub">Enter a new password for your account.</p>

    <form action="login.html" method="get">
      <label for="password">New password</label>
      <input type="password" id="password" name="password" placeholder="Min. 8 characters" required>
      <div class="hint">Must include uppercase, lowercase, number, and special character.</div>

      <label for="confirm">Confirm new password</label>
      <input type="password" id="confirm" name="confirm" placeholder="Repeat password" required>

      <!-- Inline checklist (for testing appearance) -->
      <div style="margin-top:10px;font-size:12px;color:#555;">
        <div>&#10003; At least 8 characters</div>
        <div>&#10003; Uppercase letter</div>
        <div>&#10003; Lowercase letter</div>
        <div>&#10003; Number</div>
        <div>&#10003; Special character</div>
      </div>

      <button type="submit" class="btn btn-primary">Reset Password</button>
    </form>

    <!-- Success state -->
    <!--
    <div class="success-msg">
      Password reset successfully. All sessions have been logged out. Please log in again.
    </div>
    <a href="login.html" class="btn btn-primary" style="display:block;text-align:center;margin-top:12px;">Log In</a>
    -->

    <div class="link-row">
      <a href="login.html">Back to login</a>
    </div>
  </div>
</div>

</body>
</html>

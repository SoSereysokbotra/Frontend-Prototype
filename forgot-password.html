<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JobFits - Forgot Password</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-page">
  <div class="auth-box">
    <h1>Reset Your Password</h1>
    <p class="sub">Enter your email to receive a reset link.</p>

    <form action="reset-password.html" method="get">
      <label for="email">Email address</label>
      <input type="email" id="email" name="email" placeholder="john@example.com" required>

      <button type="submit" class="btn btn-primary">Send Reset Link</button>
    </form>

    <!-- Show this after submission -->
    <!--
    <div class="success-msg">
      Reset link sent to john@example.com. Check your inbox.<br>
      Link expires in 24 hours.
    </div>
    <button class="btn btn-secondary btn-small" style="margin-top:10px;">Resend reset link</button>
    -->

    <div class="link-row">
      <a href="login.html">Back to login</a>
    </div>
  </div>
</div>

</body>
</html>

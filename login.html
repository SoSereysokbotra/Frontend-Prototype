<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JobFits - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-page">
  <div class="auth-box">
    <h1>JobFits</h1>
    <p class="sub">Log in to your account</p>

    <!-- OAuth buttons -->
    <div class="oauth-row">
      <button class="oauth-btn">Google</button>
      <button class="oauth-btn">LinkedIn</button>
    </div>
    <div class="divider">or login with email</div>

    <!-- Login form -->
    <form action="dashboard.html" method="get">
      <label for="email">Email address</label>
      <input type="email" id="email" name="email" placeholder="john@example.com" required>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Your password" required>

      <div class="checkbox-row">
        <input type="checkbox" id="remember" name="remember">
        <label for="remember" style="margin:0;font-weight:normal;">Remember me</label>
      </div>

      <!-- Example: show error when credentials wrong -->
      <!-- <div class="error-msg">Email or password is incorrect.</div> -->

      <button type="submit" class="btn btn-primary">Log In</button>
    </form>

    <div class="link-row">
      <a href="forgot-password.html">Forgot password?</a>
    </div>
    <div class="link-row">
      No account? <a href="signup.html">Sign up</a>
    </div>
  </div>
</div>

</body>
</html>
